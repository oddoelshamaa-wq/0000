<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>نظام الشماع - بصمة الموظف</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
<style>
:root{--bg:#060a13;--card:rgba(15,23,42,0.75);--card-solid:#0f172a;--primary:#0ea5e9;--primary-glow:rgba(14,165,233,0.25);--accent:#f59e0b;--success:#10b981;--danger:#f43f5e;--text:#e2e8f0;--text-dim:#64748b;--border:rgba(255,255,255,0.07);--radius:18px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.container{max-width:920px;margin:0 auto;padding:20px 16px}
.glass{background:var(--card);backdrop-filter:blur(30px);border:1px solid var(--border);border-radius:var(--radius);padding:28px}
.page-title{text-align:center;font-size:1.6rem;font-weight:900;color:var(--primary);margin-bottom:10px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:14px 28px;border:none;border-radius:12px;font-family:'Cairo';font-weight:700;cursor:pointer;transition:all 0.25s;color:#fff}
.btn-primary{background:var(--primary)}
.btn-success{background:var(--success)}
.btn-danger{background:var(--danger)}
.btn-full{width:100%}
.hidden{display:none!important}

/* ستايل محطة المدير (QR المتغير) */
.manager-qr-box{text-align:center;padding:20px;background:white;border-radius:20px;display:inline-block;margin-top:20px;box-shadow:0 0 30px var(--primary-glow)}
.qr-timer-bar{height:5px;background:var(--primary);width:100%;margin-top:10px;border-radius:10px;transition:width 1s linear}

/* ستايل الموظف (الماسح) */
.scan-area{background:rgba(0,0,0,0.4);border-radius:20px;overflow:hidden;border:2px solid var(--primary);margin-top:20px}
#reader{width:100%}

.status-card{background:rgba(255,255,255,0.03);padding:20px;border-radius:20px;text-align:center;border:1px solid var(--border);margin-bottom:20px}
.status-time{font-size:2.5rem;font-weight:900;color:var(--success)}

#toastBox{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:9999;width:90%;max-width:400px}
.toast-item{padding:15px;border-radius:12px;margin-bottom:10px;color:#fff;font-weight:700;text-align:center;animation:slideUp 0.3s ease}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}

table{width:100%;border-collapse:collapse;margin-top:20px}
th,td{padding:12px;text-align:center;border-bottom:1px solid var(--border)}
th{color:var(--primary)}
</style>
</head>
<body>

<div id="toastBox"></div>

<div class="container">
    <!-- تسجيل الدخول -->
    <div id="screenLogin" class="screen">
        <div class="glass" style="max-width:400px;margin:80px auto;">
            <div class="page-title">نظام الشماع</div>
            <div style="margin-bottom:15px;">
                <label style="display:block;margin-bottom:5px;">اسم المستخدم</label>
                <input type="text" id="loginUser" style="width:100%;padding:12px;border-radius:10px;border:none;background:rgba(0,0,0,0.5);color:#fff;">
            </div>
            <div style="margin-bottom:20px;">
                <label style="display:block;margin-bottom:5px;">كلمة المرور</label>
                <input type="password" id="loginPass" style="width:100%;padding:12px;border-radius:10px;border:none;background:rgba(0,0,0,0.5);color:#fff;">
            </div>
            <button class="btn btn-primary btn-full" onclick="doLogin()">دخول</button>
        </div>
    </div>

    <!-- شاشة المدير (محطة البصمة) -->
    <div id="screenAdmin" class="screen hidden">
        <div class="glass" style="text-align:center;">
            <div class="page-title">محطة البصمة - المدير</div>
            <p style="color:var(--text-dim);">اطلب من الموظف تصوير الكود أدناه</p>
            
            <div class="manager-qr-box">
                <div id="managerQr"></div>
                <div class="qr-timer-bar" id="qrTimer"></div>
            </div>
            
            <p id="qrExpLabel" style="margin-top:10px;font-size:0.8rem;color:var(--accent);">يتغير الكود خلال: <span id="seconds">15</span> ثانية</p>

            <div class="table-wrap">
                <table>
                    <thead>
                        <tr><th>الموظف</th><th>الدخول</th><th>الخروج</th></tr>
                    </thead>
                    <tbody id="attTableBody"></tbody>
                </table>
            </div>
            <button class="btn btn-danger btn-full" style="margin-top:20px;" onclick="location.reload()">خروج</button>
        </div>
    </div>

    <!-- شاشة الموظف (الماسح الضوئي) -->
    <div id="screenEmployee" class="screen hidden">
        <div class="glass">
            <div class="page-title" id="empWelcome">--</div>
            
            <div id="empStatusCard" class="status-card">
                <p style="color:var(--text-dim);">حالتك اليوم</p>
                <div class="status-time" id="lastActionTime">--:--</div>
                <p id="lastActionType" style="color:var(--success);">لم تسجل دخول بعد</p>
            </div>

            <button id="startScanBtn" class="btn btn-primary btn-full" style="height:80px;font-size:1.2rem;" onclick="startScanning()">
                <i class="fa-solid fa-camera"></i> تسجيل بصمة (تصوير الكود)
            </button>

            <div id="readerArea" class="hidden">
                <div class="scan-area">
                    <div id="reader"></div>
                </div>
                <button class="btn btn-danger btn-full" style="margin-top:10px;" onclick="stopScanning()">إلغاء</button>
            </div>

            <button class="btn btn-ghost btn-full" style="margin-top:30px;" onclick="location.reload()">خروج</button>
        </div>
    </div>
</div>

<script>
/* الإعدادات */
const FB_CFG={apiKey:"AIzaSyBojsAZ73wpf-4cD8TviULncyxIIOUO2qY",authDomain:"brak-nagaf.firebaseapp.com",projectId:"brak-nagaf",storageBucket:"brak-nagaf.firebasestorage.app",messagingSenderId:"149166416863",appId:"1:149166416863:web:e94fe392f868da07bbda6a",databaseURL:"https://brak-nagaf-default-rtdb.firebaseio.com/"};
firebase.initializeApp(FB_CFG);
const db=firebase.database();

const ADMINS=['mahmoud','abutamim','ahmed'];
let ME=null, scanner=null, qrTimerInterval=null;

/* تنبيهات */
function toast(m,t='info'){
    const b=document.getElementById('toastBox'),el=document.createElement('div');
    el.className=`toast-item`;
    el.style.background = t==='success'?'var(--success)':(t==='error'?'var(--danger)':'var(--primary)');
    el.textContent=m;
    b.appendChild(el);
    setTimeout(()=>el.remove(),3000);
}

/* تسجيل الدخول */
function doLogin(){
    const u=document.getElementById('loginUser').value.trim().toLowerCase();
    const p=document.getElementById('loginPass').value.trim();
    db.ref(`users/${u}`).once('value', s=>{
        const user = s.val();
        if(!user || user.password !== p){ toast('خطأ في البيانات','error'); return; }
        ME = { username:u, ...user };
        if(ADMINS.includes(u)) startAdmin(); else startEmployee();
    });
}

/* ---------------- مـنـطـق الـمـديـر ---------------- */
function startAdmin(){
    document.getElementById('screenLogin').classList.add('hidden');
    document.getElementById('screenAdmin').classList.remove('hidden');
    generateDynamicQr();
    
    // استماع للحضور في الوقت الفعلي
    const today = new Date().toISOString().split('T')[0];
    db.ref('users').on('value', s=>{
        const users = s.val();
        const body = document.getElementById('attTableBody');
        body.innerHTML='';
        Object.keys(users).forEach(uk=>{
            if(ADMINS.includes(uk)) return;
            const att = (users[uk].attendance && users[uk].attendance[today]) ? users[uk].attendance[today] : null;
            body.innerHTML += `<tr><td>${users[uk].realName || uk}</td><td>${att?att.clockIn:'--'}</td><td>${att?att.clockOut:'--'}</td></tr>`;
        });
    });
}

function generateDynamicQr(){
    const qrDiv = document.getElementById('managerQr');
    const timerBar = document.getElementById('qrTimer');
    const secondsSpan = document.getElementById('seconds');
    let timeLeft = 15;

    const updateQr = () => {
        qrDiv.innerHTML = '';
        // كود مشفر يحتوي على كلمة سر + تاريخ اليوم + الدقيقة الحالية (لضمان الأمان)
        const secret = "SHAMAA_SEC_" + new Date().getMinutes();
        new QRCode(qrDiv, { text: secret, width: 200, height: 200 });
        timeLeft = 15;
    };

    updateQr();
    qrTimerInterval = setInterval(()=>{
        timeLeft--;
        secondsSpan.textContent = timeLeft;
        timerBar.style.width = (timeLeft / 15 * 100) + "%";
        if(timeLeft <= 0) updateQr();
    }, 1000);
}

/* ---------------- مـنـطـق الـمـوظـف ---------------- */
function startEmployee(){
    document.getElementById('screenLogin').classList.add('hidden');
    document.getElementById('screenEmployee').classList.remove('hidden');
    document.getElementById('empWelcome').textContent = "أهلاً، " + (ME.realName || ME.username);
    
    const today = new Date().toISOString().split('T')[0];
    db.ref(`users/${ME.username}/attendance/${today}`).on('value', s=>{
        const att = s.val();
        if(att){
            document.getElementById('lastActionTime').textContent = att.clockOut || att.clockIn;
            document.getElementById('lastActionType').textContent = att.clockOut ? "تم تسجيل الانصراف" : "تم تسجيل الحضور";
        }
    });
}

function startScanning(){
    document.getElementById('readerArea').classList.remove('hidden');
    document.getElementById('startScanBtn').classList.add('hidden');
    
    scanner = new Html5Qrcode("reader");
    scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text)=>{
        validateAndPunch(text);
    });
}

function stopScanning(){
    if(scanner){
        scanner.stop().then(()=>{
            document.getElementById('readerArea').classList.add('hidden');
            document.getElementById('startScanBtn').classList.remove('hidden');
        });
    }
}

function validateAndPunch(qrText){
    // التحقق هل الكود هو كود المدير الصحيح (تأكد أن الدقيقة متطابقة)
    const currentSecret = "SHAMAA_SEC_" + new Date().getMinutes();
    const prevSecret = "SHAMAA_SEC_" + (new Date().getMinutes() - 1); // للسماح بهامش دقيقة واحدة

    if(qrText === currentSecret || qrText === prevSecret){
        stopScanning();
        recordAttendance();
    } else {
        toast("الكود منتهي الصلاحية أو خاطئ", "error");
    }
}

function recordAttendance(){
    const today = new Date().toISOString().split('T')[0];
    const nowTime = new Date().toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'});
    
    const ref = db.ref(`users/${ME.username}/attendance/${today}`);
    ref.once('value', s=>{
        const att = s.val();
        if(!att){
            ref.set({ clockIn: nowTime, status: 'Present', date: today }).then(()=> toast("تم تسجيل الحضور بنجاح", "success"));
        } else if(!att.clockOut){
            ref.update({ clockOut: nowTime }).then(()=> toast("تم تسجيل الانصراف بنجاح", "success"));
        } else {
            toast("لقد سجلت حضور وانصراف بالفعل اليوم", "info");
        }
    });
}
</script>
</body>
</html>
